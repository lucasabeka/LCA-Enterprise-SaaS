spring.application.name=lca-enterprise
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/lca_enterprise
spring.datasource.username=${DB_USERNAME:lca_user}
spring.datasource.password=${DB_PASSWORD:lca_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

anthropicapi.key=${ANTHROPIC_API_KEY}
anthropic.model=claude-sonnet-4-6

management.endpoints.web.exposure.include=health,info,metrics
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
